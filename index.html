<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }

        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }

        input {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            flex: 1;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background-color: #f44336;
            padding: 4px 8px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #da190b;
        }

        li {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        li div:first-child {
            flex: 1;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        span {
            flex: 1;
            cursor: pointer;
        }
        
        .delete-btn {
            background-color: #f44336;
            padding: 4px 8px;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background-color: #da190b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Список дел</h1>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Введите задачу...">
            <button id="addButton">Добавить</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
